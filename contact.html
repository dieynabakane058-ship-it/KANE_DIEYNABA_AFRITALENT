 <!--contact-->
    <main class="contact-section">
        <h2>contacts</h2>
        <div>
            <form id="contactForm" class="contact-form">
                <!--formulaire-->
                <label> NOM:</label>
                <input type="text" id="nom">
                <small class="error" id="nomError"></small>

                <label>EMAIL:</label>
                <input type="email" id="email">
                <small class="error" id="emailError"></small>

                <label>SUJET:</label>
                <select id="sujet">
                    <option value=""> Choisir un sujet</option>
                    <option>Information</option>
                    <option>Support</option>
                </select>
                <small class="error" id="sujetError"></small>


                <label>Message</label>
                <textarea id="message" placeholder="votre message"></textarea>
                <small class="error" id="messageError"></small>
                <button type="submit">ENVOYER</button>
                <p id="successMessage"></p>
            </form>
        </div>

        <!--infos-->

        <section class="contact-info">
            <h2>Informations</h2>
            <div class="info-box">
                <h3>Email</h3>
                <p> contact@afritalent.com</p>
            </div>
            <div class="info-box">
                <h3>Téléphone</h3>
                <p> +221 77 632 41 39</p>
            </div>
        </section>

        <section class="info-box">
            <h2>Localisation</h2>
            <iframe src="https://maps.google.com/maps?q=dakar&output=embed" width="300" height="200">
            </iframe>
        </section>

    </main>

    <button id="topBtn">Retour en haut</button>
